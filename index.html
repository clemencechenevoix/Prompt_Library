<html>
    <head>
        <title>
            Prompt_Library
        </title>
        <link href = "./style.css" rel = "stylesheet">
    </head>

    <body>
        <h2>Prompts library</h2>
        <table id = "Table_json_prompts">
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Prompt</th>
            </tr>
        </table>

        <script src = "./app.js">
        </script>

        <form>
        <label for="title">Title</label>
        <input type="text" id="title" title="title" placeholder="The title of your prompt" required>
        <label for="title">Category</label>
        <input type="text" id="category" category="category" placeholder="The category of your prompt" required>
        <label for="title">Prompt</label>
        <input type="text" id="prompt" prompt="prompt" placeholder="Your prompt" required>
        </form>
    </body>
</html>
